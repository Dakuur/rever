name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Flutter unit + widget tests ──────────────────────────────────────────────
  flutter-tests:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Verify Flutter environment
        working-directory: flutter_app
        run: flutter doctor -v

      - name: Run Flutter unit tests (VM)
        working-directory: flutter_app
        run: flutter test test/models/ test/services/ test/config/ test/widget_test.dart --reporter=expanded --coverage

      - name: Run Flutter widget tests (Chrome)
        working-directory: flutter_app
        run: flutter test test/widgets/ --platform chrome --reporter=expanded
        continue-on-error: false

      - name: Upload Flutter coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: flutter_app/coverage/lcov.info

  # ── Node.js / Shopify App tests ───────────────────────────────────────────────
  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rever-chatbot/package-lock.json

      - name: Install Node dependencies
        working-directory: rever-chatbot
        run: npm ci

      - name: Run Node tests
        working-directory: rever-chatbot
        run: npm test

      - name: Run Node tests with coverage
        if: success()
        working-directory: rever-chatbot
        run: npm run test:coverage

      - name: Upload Node coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage
          path: rever-chatbot/coverage/lcov.info

  # ── Type checking ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rever-chatbot/package-lock.json

      - name: Install dependencies
        working-directory: rever-chatbot
        run: npm ci

      - name: Run TypeScript type check
        working-directory: rever-chatbot
        run: npm run typecheck
        continue-on-error: true
