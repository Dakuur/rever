<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="REVER – Shopping Assistant & Returns">

  <!-- Optimised for iframe embed in Shopify -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="REVER">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>REVER Assistant</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Remove default margins so the widget fills the iframe cleanly */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Enable text selection inside Flutter Web */
    flt-glass-pane { user-select: text; -webkit-user-select: text; }
    /* Prevent scroll from propagating to the Shopify parent page */
    html, body {
      height: 100%;
      background: transparent;
      overscroll-behavior: contain;
    }
    /* Loading splash */
    #loading-splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #F7F7F8;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading-splash.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #EDECFF;
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .splash-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #6C63FF, #9B96FF);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: white;
      font-family: -apple-system, sans-serif;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <!-- Loading splash shown while Flutter initialises -->
  <div id="loading-splash">
    <div class="splash-logo">R</div>
    <div class="spinner"></div>
  </div>

  <script>
    // Hide splash once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      const splash = document.getElementById('loading-splash');
      splash.classList.add('hidden');
      setTimeout(() => splash.remove(), 500);
    });
  </script>
  <script>
    // REVER cart bridge – debug listener.
    // The actual cart handling is done by CartService in Dart via dart:html window.onMessage.
    // This listener only logs so you can confirm the postMessage arrived in the iframe context.
    window.addEventListener('message', function(e) {
      if (!e.data) return;
      try {
        var msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        if (!msg || msg.type !== 'rever:cart') return;
        var cart = msg.cart || {};
        var itemCount = cart.item_count || 0;
        var total = cart.total_price ? (cart.total_price / 100).toFixed(2) : '0.00';
        var currency = cart.currency || 'EUR';
        console.log('[REVER] 🛒 postMessage received in iframe: ' + itemCount + ' items | ' + currency + ' ' + total);
      } catch(err) {
        console.warn('[REVER] ⚠️ Error in debug cart listener:', err);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
