name: rever_chat
description: REVER Shopping Assistant & Returns Chatbot for Shopify
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # Gemini AI
  google_generative_ai: ^0.4.6

  # HTTP – Shopify Storefront API
  http: ^1.2.2

  # UI / UX
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.4
  intl: ^0.19.0
  cached_network_image: ^3.4.1

  # Utils
  shared_preferences: ^2.3.2
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
